# HAProxy LB for Rinha de Backend 2026.
#
# Topology: TCP 0.0.0.0:9999  ->  UDS /sockets/api{1,2}.sock (round-robin).
#
# Mode TCP: byte-level passthrough — no HTTP parsing in the LB. Matches the
# "no business logic in the LB" rule and avoids paying HAProxy's HTTP cost
# on the hot path. Keep-alive is end-to-end client<->API; the LB just
# shuffles bytes.
#
# Sized for the cgroup envelope (0.10 CPU / 16 MB):
#   - nbthread 1: 0.10 CPU is throttled hard; extra threads buy nothing
#     and just add scheduler noise.
#   - maxconn 512 + bufsize 8192: each session reserves 2 × bufsize, so
#     the buffer pool peaks around ~8 MB, leaving headroom for HAProxy's
#     base ~6 MB working set inside the 16 MB limit. k6 uses
#     preAllocatedVUs=100 with maxVUs=250, so 512 is 2x peak.

global
    maxconn 512
    nbthread 1
    tune.bufsize 8192
    log stdout format raw daemon

defaults
    mode tcp
    timeout connect 2s
    timeout client  30s
    timeout server  30s
    option dontlognull

frontend fe_main
    bind *:9999
    default_backend be_apis

backend be_apis
    balance roundrobin
    # UDS backends: HAProxy connects via AF_UNIX, skipping the TCP stack
    # on the LB->API hop. Same hop the previous Crystal LB used.
    server api1 /sockets/api1.sock
    server api2 /sockets/api2.sock
