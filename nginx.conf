# Pure round-robin load balancer for /fraud-score and /ready.
# No payload inspection, no responding, no decisioning here — the rules
# explicitly forbid the LB from running business logic.

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/stderr crit;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    keepalive_timeout 75s;
    keepalive_requests 10000;

    # Default load-balancing strategy is round-robin; do not change.
    upstream api_upstream {
        server api1:9999;
        server api2:9999;
        keepalive 256;
    }

    server {
        listen 9999 default_server backlog=4096;
        listen [::]:9999 default_server backlog=4096;

        location / {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
