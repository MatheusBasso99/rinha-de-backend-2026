# Pure round-robin load balancer for /fraud-score and /ready.
# No payload inspection, no responding, no decisioning here — the rules
# explicitly forbid the LB from running business logic.

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    keepalive_timeout 75s;
    keepalive_requests 10000;

    # Default load-balancing strategy is round-robin; do not change.
    # max_fails=0 keeps both upstreams in rotation even after a
    # transient RST, which the Crystal HTTP::Server occasionally emits
    # under load on kept-alive sockets.
    upstream api_upstream {
        server api1:9999 max_fails=0;
        server api2:9999 max_fails=0;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 default_server backlog=4096;
        listen [::]:9999 default_server backlog=4096;

        location / {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Retry on transient errors. Without this, the keep-alive
            # race surfaces as 502 to the client; with it, nginx
            # silently retries on the other upstream.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 2s;

            proxy_connect_timeout 1s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
