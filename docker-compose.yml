# Rinha de Backend 2026 — submission topology.
#
# This branch contains ONLY the artifacts needed to run the official
# test: docker-compose.yml, haproxy.cfg, and info.json. Source code
# lives on the `main` branch.
#
# The API image is published at ghcr.io/matheusbasso99/rinha-de-backend-2026
# and contains the API server (`rinha_de_backend`, default ENTRYPOINT)
# statically linked for linux/amd64 with `references.bin` (~95 MiB)
# baked in so boot is just `open + mmap`.
#
# The LB is HAProxy `lts-alpine` in `mode tcp` (round-robin TCP→UDS
# byte-passthrough — no HTTP parsing in the LB, matching the "no
# business logic in the LB" rinha rule).
#
# Constraints enforced here:
#   - Network mode: bridge (host/privileged forbidden).
#   - 1 LB + 2 API instances, simple round-robin.
#   - Sum of all service limits: <= 1 CPU and <= 350 MB RAM.
#       lb   : 0.10 CPU /  16 MB    (HAProxy, mode tcp, UDS backends)
#       api1 : 0.45 CPU / 167 MB    (Crystal API, single-threaded fibers)
#       api2 : 0.45 CPU / 167 MB    (Crystal API, single-threaded fibers)
#       total: 1.00 CPU / 350 MB
#   - App responds on localhost:9999 (published by the LB only).
#
# LB→API hop runs over Unix Domain Sockets via the shared `rinha-sockets`
# volume — skips the TCP/IP stack on the loopback hop entirely.

x-api: &api
  image: ghcr.io/matheusbasso99/rinha-de-backend-2026:v3-a0ba5918
  networks:
    - rinha-net
  volumes:
    - rinha-sockets:/sockets
  healthcheck:
    # API binds a UDS, not TCP — `test -S` confirms the socket file is
    # present (the API removes any stale file before bind, then creates
    # it once it's listening, so existence == listening).
    #
    # Budget: start_period 60s + retries 30 × interval 2s = 120s total
    # grace. Issue #1930 failed the previous 30s budget on the Mac Mini
    # Late 2014 (Haswell-U + 5400 RPM HDD likely): cold MAP_POPULATE of
    # references.bin (~95 MiB) plus the post-madvise prefault loop can
    # take longer than 30s on slow storage. The increased grace is
    # no-cost for the actual benchmark — once the API is healthy, it
    # stays healthy and serves at full speed.
    test: ["CMD-SHELL", "test -S /sockets/${RINHA_INSTANCE:-api}.sock"]
    interval: 2s
    timeout: 2s
    retries: 30
    start_period: 60s
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "167MB"
  restart: unless-stopped

services:
  api1:
    <<: *api
    container_name: rinha-api1
    hostname: api1
    environment:
      RINHA_INSTANCE: api1
      RINHA_LISTEN_UDS: /sockets/api1.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/api1.sock"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 60s

  api2:
    <<: *api
    container_name: rinha-api2
    hostname: api2
    environment:
      RINHA_INSTANCE: api2
      RINHA_LISTEN_UDS: /sockets/api2.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/api2.sock"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 60s

  lb:
    image: haproxy:lts-alpine
    platform: linux/amd64
    container_name: rinha-lb
    hostname: lb
    # Run as root: the API binds its UDS with default mode 0755 root:root,
    # and HAProxy's worker would otherwise drop to uid 99 (haproxy) and
    # fail `connect()` on /sockets/api{1,2}.sock with EACCES. Stays inside
    # the container; LB still has no exposure beyond port 9999.
    user: "0:0"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha-net
    volumes:
      - rinha-sockets:/sockets
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "16MB"
    restart: unless-stopped

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
