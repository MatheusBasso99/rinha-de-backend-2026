# Rinha de Backend 2026 — submission topology.
#
# Constraints enforced here:
#   - Network mode: bridge (host/privileged forbidden).
#   - 1 LB + 2 API instances, simple round-robin (HAProxy mode tcp).
#   - Sum of all service limits: <= 1 CPU and <= 350 MB RAM.
#       lb   : 0.10 CPU /  16 MB    (HAProxy, mode tcp, UDS backends)
#       api1 : 0.45 CPU / 167 MB    (Crystal API, single-threaded fibers)
#       api2 : 0.45 CPU / 167 MB    (Crystal API, single-threaded fibers)
#       total: 1.00 CPU / 350 MB
#   - App responds on localhost:9999 (published by the LB only).
#
# LB choice (this iter): HAProxy `lts-alpine` (3.2). Replaces the
# previous Crystal `rinha_lb` binary. HAProxy runs in `mode tcp`, so
# it byte-forwards connections without parsing HTTP — the LB still
# carries no business logic, matching the rinha rule.
#
# LB->API hop runs over Unix Domain Sockets via a shared volume,
# `rinha-sockets`. Same hop as before; only the LB process changed.

x-api: &api
  image: rinha_de_backend:local
  build:
    context: .
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
  networks:
    - rinha-net
  volumes:
    - rinha-sockets:/sockets
  healthcheck:
    # The API binds a UDS, not a TCP port — use socat-via-wget through
    # the socket would need extra binaries. Instead, rely on the file
    # being present (the API removes any stale file before bind, then
    # creates it once it's listening, so existence == listening).
    test: ["CMD-SHELL", "test -S /sockets/${RINHA_INSTANCE:-api}.sock"]
    interval: 2s
    timeout: 2s
    retries: 10
    # Boot is now O(open + mmap) since references.bin is built into the
    # image. 10s start_period leaves slack for the first scheduling tick.
    start_period: 10s
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "167MB"
  restart: unless-stopped

services:
  api1:
    <<: *api
    container_name: rinha-api1
    hostname: api1
    environment:
      RINHA_INSTANCE: api1
      RINHA_LISTEN_UDS: /sockets/api1.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/api1.sock"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s

  api2:
    <<: *api
    container_name: rinha-api2
    hostname: api2
    environment:
      RINHA_INSTANCE: api2
      RINHA_LISTEN_UDS: /sockets/api2.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/api2.sock"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s

  lb:
    image: haproxy:lts-alpine
    platform: linux/amd64
    container_name: rinha-lb
    hostname: lb
    # Run as root: the API binds its UDS with default mode 0755 root:root,
    # and HAProxy's worker would otherwise drop to uid 99 (haproxy) and
    # fail `connect()` on /sockets/api{1,2}.sock with EACCES. Stays inside
    # the container; LB still has no exposure beyond port 9999.
    user: "0:0"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha-net
    volumes:
      - rinha-sockets:/sockets
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "16MB"
    restart: unless-stopped

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
