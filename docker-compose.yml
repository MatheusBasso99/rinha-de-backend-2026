# Rinha de Backend 2026 — submission topology.
#
# Constraints enforced here:
#   - Network mode: bridge (host/privileged forbidden).
#   - 1 LB + 2 API instances, simple round-robin (in src/lb.cr).
#   - Sum of all service limits: <= 1 CPU and <= 350 MB RAM.
#       lb   : 0.10 CPU /  16 MB    (peak measured 8.19 MiB at c=100)
#       api1 : 0.45 CPU / 167 MB
#       api2 : 0.45 CPU / 167 MB
#       total: 1.00 CPU / 350 MB
#   - App responds on localhost:9999 (published by the LB only).
#
# Memory split rationale (iter 10): nginx's old 30 MB allowance was
# tightened to 16 MB after measuring the Crystal LB's working set
# under sustained load (c=100, 50k req): peak 8.19 MiB. The 14 MiB
# headroom redistributed to the APIs (+7 MB each) keeps total = 350.
# APIs currently use only ~4 MiB working set (the 84 MiB references
# mmap is file-backed and lives in page cache, not in the container
# working set), so the redistribution is preventive — it lands real
# value when TODO #9 (AoSoA16 layout) ships and doubles the per-API
# dataset footprint.
#
# LB→API hop runs over Unix Domain Sockets via a shared volume,
# `rinha-sockets`. The LB binary (`rinha_lb`) replaces nginx; it
# uses Fiber::ExecutionContext::Parallel (Crystal 1.20) to spread
# the accept loop and bidirectional copy fibers across two
# scheduler threads (TODO #8).

x-api: &api
  image: rinha_de_backend:local
  build:
    context: .
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
  networks:
    - rinha-net
  volumes:
    - rinha-sockets:/sockets
  healthcheck:
    # The API binds a UDS, not a TCP port — use socat-via-wget through
    # the socket would need extra binaries. Instead, rely on the file
    # being present (the API removes any stale file before bind, then
    # creates it once it's listening, so existence == listening).
    test: ["CMD-SHELL", "test -S /sockets/${RINHA_INSTANCE:-api}.sock"]
    interval: 2s
    timeout: 2s
    retries: 10
    # Boot is now O(open + mmap) since references.bin is built into the
    # image. 10s start_period leaves slack for the first scheduling tick.
    start_period: 10s
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "167MB"
  restart: unless-stopped

services:
  api1:
    <<: *api
    container_name: rinha-api1
    hostname: api1
    environment:
      RINHA_INSTANCE: api1
      RINHA_LISTEN_UDS: /sockets/api1.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/api1.sock"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s

  api2:
    <<: *api
    container_name: rinha-api2
    hostname: api2
    environment:
      RINHA_INSTANCE: api2
      RINHA_LISTEN_UDS: /sockets/api2.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/api2.sock"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s

  lb:
    image: rinha_de_backend:local
    container_name: rinha-lb
    hostname: lb
    entrypoint: ["/usr/local/bin/rinha_lb"]
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha-net
    volumes:
      - rinha-sockets:/sockets
    environment:
      RINHA_LB_HOST: 0.0.0.0
      RINHA_LB_PORT: "9999"
      RINHA_UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      # Parallelism = 2 matches the Mac Mini Late 2014 physical cores
      # (Haswell-U i5-4278U, 2C/4T). The cgroup limit (0.10 CPU) caps
      # aggregate throughput regardless; spreading across schedulers
      # mainly helps when one fiber is parked in epoll_wait and a
      # sibling has work ready.
      RINHA_LB_PARALLELISM: "2"
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "16MB"
    restart: unless-stopped

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
